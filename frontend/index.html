<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ElectricAI India — Demand Forecasting & Grid Planning</title>
  <meta name="description" content="India electricity demand forecasting and grid planning dashboard powered by machine learning." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/static/css/main.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
</head>
<body>

<!-- ═══════════════════════ SIDEBAR ═══════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">
      <span class="logo-title">ElectricAI</span>
      <span class="logo-sub">India Grid Intelligence</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a href="#" class="nav-item active" data-page="overview" id="nav-overview">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Overview</span>
    </a>
    <a href="#" class="nav-item" data-page="regional" id="nav-regional">
      <span class="nav-icon">🗺️</span>
      <span class="nav-label">Regional Analysis</span>
    </a>
    <a href="#" class="nav-item" data-page="forecast" id="nav-forecast">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Forecasting</span>
    </a>
    <a href="#" class="nav-item" data-page="grid" id="nav-grid">
      <span class="nav-icon">⚡</span>
      <span class="nav-label">Grid Planning</span>
    </a>
    <a href="#" class="nav-item" data-page="compare" id="nav-compare">
      <span class="nav-icon">🤖</span>
      <span class="nav-label">Model Comparison</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="status-dot" id="api-status-dot"></div>
    <span class="status-text" id="api-status-text">Connecting...</span>
  </div>
</aside>

<!-- ═══════════════════════ MAIN CONTENT ═══════════════════════ -->
<main class="main" id="main">

  <!-- Top bar -->
  <header class="topbar">
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
    <div class="topbar-title" id="page-title">Overview</div>
    <div class="topbar-right">
      <div class="live-badge">
        <span class="live-dot"></span>
        <span>Live Data</span>
      </div>
      <div class="date-display" id="current-date"></div>
    </div>
  </header>

  <!-- Page content area -->
  <div class="page-content" id="page-content">
    <!-- Pages injected here by JS -->
  </div>

</main>

<!-- ═══════════════════════ LOADING OVERLAY ═══════════════════════ -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner">
    <div class="spinner-ring"></div>
    <div class="spinner-text">Loading...</div>
  </div>
</div>

<!-- Scripts -->
<script src="/static/js/utils.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/pages/overview.js"></script>
<script src="/static/js/pages/regional.js"></script>
<script src="/static/js/pages/forecast.js"></script>
<script src="/static/js/pages/grid.js"></script>
<script src="/static/js/pages/compare.js"></script>
<script src="/static/js/app.js"></script>
