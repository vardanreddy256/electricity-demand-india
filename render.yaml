services:
  - type: web
    name: india-power-analytics
    env: python
    repo: https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME # Update this after creation
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
    plan: free
